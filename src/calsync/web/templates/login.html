<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CalSync Login</title>
  </head>
  <body>
    <h1>Admin login</h1>

    {% if errors %}
    <ul>
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form method="post" action="/login">
      <label>
        Username
        <input name="username" type="text" value="{{ username }}" />
      </label>
      <label>
        Password
        <input name="password" type="password" />
      </label>
      <button type="submit">Continue</button>
    </form>
  </body>
</html>
